<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
    <defs>
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#546E7A;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#546E7Add;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="shinyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.3" />
            <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
        </linearGradient>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.25"/>
        </filter>
        <filter id="innerShadow">
            <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
            <feOffset dx="0" dy="2" result="offsetBlur"/>
            <feComposite in="SourceGraphic" in2="offsetBlur" operator="over"/>
        </filter>
    </defs>
    
    <!-- Основной фон -->
    <rect width="400" height="300" rx="15" fill="url(#bgGrad)" filter="url(#shadow)"/>
    
    <!-- Декоративные круги -->
    <circle cx="320" cy="80" r="140" fill="#ffffff" opacity="0.08"/>
    <circle cx="80" cy="240" r="100" fill="#ffffff" opacity="0.06"/>
    <circle cx="200" cy="150" r="180" fill="#ffffff" opacity="0.04"/>
    
    <!-- Полоса снизу для производителя -->
    <rect x="0" y="240" width="400" height="60" rx="0" fill="#000000" opacity="0.2"/>
    <rect x="0" y="240" width="400" height="60" rx="0" fill="url(#shinyGrad)"/>
    
    <!-- Иконка категории -->
    <text x="200" y="100" text-anchor="middle" font-size="60" filter="url(#innerShadow)">🩸</text>
    
    <!-- Название препарата -->
    <text x="200" y="175" text-anchor="middle" font-family="Arial, sans-serif" 
          font-size="32" font-weight="bold" fill="#ffffff" 
          filter="url(#innerShadow)">Сивит</text>
    
    <!-- Название производителя -->
    <text x="200" y="278" text-anchor="middle" font-family="Arial, sans-serif" 
          font-size="12" fill="#ffffff" opacity="0.9">
        Stada, Германия
    </text>
    
    <!-- Декоративная линия -->
    <line x1="100" y1="200" x2="300" y2="200" stroke="#ffffff" stroke-width="2" opacity="0.3"/>
    
    <!-- Маленькие декоративные таблетки -->
    <circle cx="50" cy="50" r="15" fill="#ffffff" opacity="0.15"/>
    <circle cx="350" cy="200" r="20" fill="#ffffff" opacity="0.1"/>
    <circle cx="30" cy="200" r="12" fill="#ffffff" opacity="0.12"/>
</svg>